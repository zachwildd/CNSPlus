<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Character Sheet Viewer</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #1a1a1a;
      color: #e8e8e8;
      padding: 2rem;
      line-height: 1.4;
    }
    header { margin-bottom: 2.5rem; }
    header h1 { margin: 0 0 0.5rem; font-size: 2rem; font-weight: 600; }
    header .style-spec { color: #aaa; font-size: 0.95rem; max-width: 80ch; margin: 0 0 0.5rem; }
    header .meta { color: #777; font-size: 0.825rem; margin: 0; }
    section { margin-bottom: 3rem; }
    section h2 {
      margin: 0 0 1rem;
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
    }
    .row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
    }
    .cell {
      background: #222;
      border-radius: 4px;
      padding: 0.5rem;
      display: flex;
      flex-direction: column;
    }
    .cell img {
      width: 100%;
      height: auto;
      background: white;
      border-radius: 2px;
      display: block;
    }
    .cell .label {
      margin-top: 0.5rem;
      font-size: 0.825rem;
      color: #aaa;
      text-align: center;
    }
    .cell .duration {
      font-size: 0.7rem;
      color: #666;
      text-align: center;
      margin-top: 0.125rem;
    }
    .cell.failed { border: 1px solid #663030; }
    .cell.failed .placeholder {
      width: 100%;
      aspect-ratio: 1;
      background: #2a1a1a;
      color: #c88;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      text-align: center;
      font-size: 0.75rem;
      border-radius: 2px;
    }
    .cell.missing { opacity: 0.45; }
    .cell.missing .placeholder {
      width: 100%;
      aspect-ratio: 1;
      background: #2a2a2a;
      color: #666;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 2px;
      font-size: 0.825rem;
    }
    .anchor-note {
      grid-column: 1 / -1;
      font-size: 0.75rem;
      color: #666;
      margin-top: -0.5rem;
    }
    #error {
      background: #2a1a1a;
      border: 1px solid #663030;
      border-radius: 4px;
      padding: 1rem;
      color: #c88;
      display: none;
    }
  </style>
</head>
<body>
  <header>
    <h1 id="char-name">Loading…</h1>
    <p class="style-spec" id="style-spec"></p>
    <p class="meta" id="meta"></p>
  </header>
  <div id="error"></div>
  <section id="turnaround-section" hidden>
    <h2>Turnaround · neutral expression</h2>
    <div class="row" id="turnaround"></div>
  </section>
  <section id="expressions-section" hidden>
    <h2>Expression sheet · front view <span style="color:#666;font-weight:400;text-transform:none;letter-spacing:0;">(neutral repeated as anchor)</span></h2>
    <div class="row" id="expressions"></div>
  </section>
  <script>
    const VIEW_LABELS = {
      "front": "Front",
      "three-quarter": "3/4",
      "side": "Side",
      "back": "Back",
    };
    const EXPR_LABELS = {
      "neutral": "Neutral",
      "smiling": "Smiling",
      "angry": "Angry",
      "surprised": "Surprised",
      "sad": "Sad",
      "smirking": "Smirking",
    };
    const TURNAROUND_CELLS = [
      "view-front_neutral",
      "view-three-quarter_neutral",
      "view-side_neutral",
      "view-back_neutral",
    ];
    const EXPRESSION_CELLS = [
      "view-front_neutral",
      "expr-front_smiling",
      "expr-front_angry",
      "expr-front_surprised",
      "expr-front_sad",
      "expr-front_smirking",
    ];

    function labelForId(id) {
      if (id.startsWith("view-")) {
        const rest = id.replace(/^view-/, "");
        const [view, expression] = rest.split("_");
        return `${VIEW_LABELS[view] ?? view} · ${EXPR_LABELS[expression] ?? expression}`;
      }
      if (id.startsWith("expr-")) {
        const rest = id.replace(/^expr-/, "");
        const [, expression] = rest.split("_");
        return `${EXPR_LABELS[expression] ?? expression} (front)`;
      }
      return id;
    }

    function renderCell(container, cellId, entry) {
      const div = document.createElement("div");
      div.className = "cell";
      const label = document.createElement("div");
      label.className = "label";
      label.textContent = labelForId(cellId);

      if (!entry) {
        div.classList.add("missing");
        const ph = document.createElement("div");
        ph.className = "placeholder";
        ph.textContent = "no entry";
        div.appendChild(ph);
        div.appendChild(label);
      } else if (entry.status === "failed") {
        div.classList.add("failed");
        const ph = document.createElement("div");
        ph.className = "placeholder";
        ph.textContent = "FAILED — " + (entry.error || "unknown error");
        div.appendChild(ph);
        div.appendChild(label);
      } else {
        const img = document.createElement("img");
        img.src = "/" + entry.outputFile;
        img.alt = labelForId(cellId);
        img.loading = "lazy";
        div.appendChild(img);
        div.appendChild(label);
        if (typeof entry.durationMs === "number") {
          const dur = document.createElement("div");
          dur.className = "duration";
          dur.textContent = (entry.durationMs / 1000).toFixed(1) + "s";
          div.appendChild(dur);
        }
      }
      container.appendChild(div);
    }

    async function init() {
      try {
        const res = await fetch("/manifest.json", { cache: "no-store" });
        if (!res.ok) throw new Error("manifest.json: HTTP " + res.status);
        const manifest = await res.json();

        document.title = manifest.characterName + " — Character Sheet";
        document.getElementById("char-name").textContent = manifest.characterName;
        document.getElementById("style-spec").textContent = manifest.styleSpec || "";
        const refCount = (manifest.conceptArtPaths || []).length;
        const lastRun = manifest.lastRunAt
          ? new Date(manifest.lastRunAt).toLocaleString()
          : "never";
        document.getElementById("meta").textContent =
          refCount + " ref" + (refCount === 1 ? "" : "s") +
          " · last run " + lastRun;

        const turnaroundEl = document.getElementById("turnaround");
        for (const cellId of TURNAROUND_CELLS) {
          renderCell(turnaroundEl, cellId, manifest.entries?.[cellId]);
        }
        document.getElementById("turnaround-section").hidden = false;

        const exprEl = document.getElementById("expressions");
        for (const cellId of EXPRESSION_CELLS) {
          renderCell(exprEl, cellId, manifest.entries?.[cellId]);
        }
        document.getElementById("expressions-section").hidden = false;
      } catch (err) {
        const msg = err instanceof Error ? err.message : String(err);
        document.getElementById("char-name").textContent = "Failed to load sheet";
        const errEl = document.getElementById("error");
        errEl.textContent = msg;
        errEl.style.display = "block";
      }
    }

    init();
  </script>
</body>
</html>
